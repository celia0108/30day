<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Zen-Learning - 設定 30 日主題</title>
  
  <!-- CSS Stylesheets -->
  <link href="css/style.css" rel="stylesheet"/>
  
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <!-- Tailwind CSS Configuration & CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="js/tailwind-config.js"></script>
  
  <!-- Page Script -->
  <script src="js/theme_settings.js" defer></script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">

  <!-- TopAppBar -->
  <header class="w-full top-0 sticky bg-surface shadow-sm z-40">
    <div class="flex items-center justify-between px-container-padding h-16">
      <a href="settings.html" class="back-btn flex items-center justify-center text-primary hover:bg-surface-container transition-colors rounded-full p-2 active:translate-y-0.5 transition-transform duration-150">
        <span class="material-symbols-outlined">arrow_back</span>
      </a>
      <h1 class="font-headline-md text-headline-md font-bold text-primary tracking-tight">設定 30 日主題</h1>
      <div class="w-10 h-10"></div>
    </div>
  </header>

  <!-- Main Canvas -->
  <main class="flex-1 w-full max-w-md mx-auto px-container-padding pt-6 pb-28">
    
    <!-- Info Section -->
    <section class="mb-6">
      <div class="bg-primary-container/20 rounded-2xl p-4 border border-primary-container/30">
        <p class="font-body-md text-body-md text-on-primary-container">
          請在下方選擇您想要自訂的挑戰天數，並輸入該天的主題與詳細說明。自訂後的內容將即時更新於首頁與挑戰關卡。
        </p>
      </div>
    </section>

    <!-- Day Grid Selector -->
    <section class="mb-6">
      <h2 class="font-label-md text-label-md text-on-surface mb-3 flex items-center gap-1">
        <span class="material-symbols-outlined text-[18px]">calendar_month</span> 選擇挑戰天數 (1 - 30)
      </h2>
      <div class="bg-surface-container-lowest rounded-xl p-4 shadow-soft border border-surface-container-low">
        <!-- 30-Day Grid (6 cols) -->
        <div id="day-grid" class="grid grid-cols-5 gap-2 max-h-48 overflow-y-auto pr-1">
          <!-- Dynamic day buttons populated by JS -->
        </div>
      </div>
    </section>

    <!-- Edit Form Area (Bento Card) -->
    <section>
      <div class="bg-surface-container-lowest rounded-2xl p-5 shadow-soft border border-surface-container-low flex flex-col">
        <div class="flex items-center justify-between mb-4 border-b border-surface-container pb-2">
          <h3 id="editing-day-label" class="font-headline-md text-headline-md text-primary font-bold">
            正在編輯：第一天
          </h3>
          <span id="day-badge" class="inline-flex items-center rounded-full bg-secondary-container px-2.5 py-0.5 font-label-sm text-label-sm text-on-secondary-container">
            Day 1
          </span>
        </div>
        
        <!-- Input Title -->
        <div class="mb-4">
          <label class="block font-label-sm text-label-sm text-on-surface-variant mb-2" for="theme-title">
            主題名稱
          </label>
          <input type="text" id="theme-title" class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary text-body-md transition-all placeholder-outline-variant/60" placeholder="請輸入主題（如：在咖啡廳點餐）">
        </div>
        
        <!-- Input Description -->
        <div class="mb-6">
          <label class="block font-label-sm text-label-sm text-on-surface-variant mb-2" for="theme-desc">
            主題說明
          </label>
          <textarea id="theme-desc" rows="3" class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary text-body-md transition-all resize-none placeholder-outline-variant/60" placeholder="請輸入說明（如：學習日常實用語句...）"></textarea>
        </div>
        
        <!-- Save Button -->
        <button id="save-theme-btn" class="w-full h-12 bg-primary text-on-primary font-label-md text-label-md rounded-lg shadow-sm hover:bg-primary/95 transition-all duration-200 active:translate-y-0.5 flex items-center justify-center gap-2">
          <span class="material-symbols-outlined text-[20px]">save</span> 儲存自訂設定
        </button>
      </div>
    </section>

  </main>

  <!-- BottomNavBar -->
  <nav class="fixed bottom-0 w-full z-50 rounded-t-xl shadow-[0_-2px_10px_rgba(0,0,0,0.04)] dark:shadow-none bg-surface-container-lowest dark:bg-surface-container md:max-w-md md:mx-auto md:left-0 md:right-0">
    <div class="flex justify-around items-center h-20 px-4 pb-safe">
      <a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-6 py-1 hover:bg-surface-variant dark:hover:bg-on-surface-variant transition-all rounded-xl active:scale-95 duration-200 group" href="index.html">
        <span class="material-symbols-outlined group-hover:-translate-y-1 transition-transform" data-icon="home">home</span>
        <span class="font-label-md text-label-md mt-1 opacity-80">首頁</span>
      </a>
      <a class="flex flex-col items-center justify-center bg-primary-container dark:bg-on-primary-fixed-variant text-on-primary-container dark:text-primary-fixed rounded-2xl px-6 py-1 hover:bg-surface-variant dark:hover:bg-on-surface-variant transition-all active:scale-95 duration-200" href="settings.html">
        <span class="material-symbols-outlined" data-icon="settings" data-weight="fill" style="font-variation-settings: 'FILL' 1;">settings</span>
        <span class="font-label-md text-label-md mt-1">設定</span>
      </a>
    </div>
  </nav>
</body>
</html>
