<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Zen-Learning - 設定</title>
  
  <!-- CSS Stylesheets -->
  <link href="css/style.css" rel="stylesheet"/>
  
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <!-- Tailwind CSS Configuration & CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="js/tailwind-config.js"></script>
  
  <!-- Page Script -->
  <script src="js/settings.js" defer></script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">

  <!-- TopAppBar -->
  <header class="w-full top-0 sticky bg-surface dark:bg-background shadow-sm dark:shadow-none z-40">
    <div class="flex items-center justify-between px-container-padding h-16">
      <a href="index.html" class="flex items-center justify-center text-primary dark:text-primary-fixed-dim hover:bg-surface-container dark:hover:bg-surface-container-highest transition-colors rounded-full p-2 active:translate-y-0.5 transition-transform duration-150">
        <span class="material-symbols-outlined" data-icon="language">language</span>
      </a>
      <h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim tracking-tight">Zen-Learning</h1>
      <div class="w-10 h-10"></div>
    </div>
  </header>

  <!-- Main Canvas -->
  <main class="flex-1 w-full max-w-md mx-auto px-container-padding pt-section-gap pb-28">
    <!-- Profile / Developer Section -->
    <section class="mb-stack-gap">
      <div class="bg-surface-container-lowest rounded-xl p-4 shadow-[0_2px_10px_rgba(30,41,59,0.04)] flex justify-between items-center transition-all hover:shadow-[0_4px_14px_rgba(30,41,59,0.06)] group cursor-default">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container shrink-0 group-hover:scale-105 transition-transform">
            <span class="material-symbols-outlined" data-icon="person">person</span>
          </div>
          <div>
            <h2 class="font-body-lg text-body-lg text-on-surface">開發者</h2>
            <p class="font-body-md text-body-md text-on-surface-variant">開發者名稱</p>
          </div>
        </div>
      </div>
    </section>

    <!-- System Settings Sub-menu -->
    <section class="mb-section-gap space-y-2">
      <a href="theme_settings.html" class="bg-surface-container-lowest rounded-xl p-4 shadow-[0_2px_10px_rgba(30,41,59,0.04)] flex justify-between items-center cursor-pointer hover:bg-surface-container-low transition-colors active:scale-[0.98]">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-primary">
            <span class="material-symbols-outlined" data-icon="edit_note">edit_note</span>
          </div>
          <span class="font-body-md text-body-md text-on-surface">設定 30 日主題</span>
        </div>
        <span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
      </a>

      <div class="bg-surface-container-lowest rounded-xl p-4 shadow-[0_2px_10px_rgba(30,41,59,0.04)] flex justify-between items-center cursor-pointer hover:bg-surface-container-low transition-colors active:scale-[0.98]">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
            <span class="material-symbols-outlined" data-icon="notifications">notifications</span>
          </div>
          <span class="font-body-md text-body-md text-on-surface">通知設定</span>
        </div>
        <span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
      </div>
      
      <div class="bg-surface-container-lowest rounded-xl p-4 shadow-[0_2px_10px_rgba(30,41,59,0.04)] flex justify-between items-center cursor-pointer hover:bg-surface-container-low transition-colors active:scale-[0.98]">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-full bg-tertiary-container flex items-center justify-center text-on-tertiary-container">
            <span class="material-symbols-outlined" data-icon="language">language</span>
          </div>
          <span class="font-body-md text-body-md text-on-surface">語言選項</span>
        </div>
        <span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
      </div>
    </section>

    <!-- Actions Section -->
    <section class="mt-section-gap">
      <button id="logout-btn" class="w-full h-12 flex items-center justify-center gap-2 bg-surface-container-lowest border border-error/20 text-error font-label-md text-label-md rounded-lg shadow-sm hover:bg-error-container hover:text-on-error-container hover:border-transparent active:translate-y-0.5 transition-all duration-200">
        <span class="material-symbols-outlined" data-icon="logout">logout</span>
        登出
      </button>
    </section>
  </main>

  <!-- BottomNavBar -->
  <nav class="fixed bottom-0 w-full z-50 rounded-t-xl shadow-[0_-2px_10px_rgba(0,0,0,0.04)] dark:shadow-none bg-surface-container-lowest dark:bg-surface-container md:max-w-md md:mx-auto md:left-0 md:right-0">
    <div class="flex justify-around items-center h-20 px-4 pb-safe">
      <!-- Home (Inactive) -->
      <a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-6 py-1 hover:bg-surface-variant dark:hover:bg-on-surface-variant transition-all rounded-xl active:scale-95 duration-200 group" href="index.html">
        <span class="material-symbols-outlined group-hover:-translate-y-1 transition-transform" data-icon="home">home</span>
        <span class="font-label-md text-label-md mt-1 opacity-80">首頁</span>
      </a>
      
      <!-- Settings (Active) -->
      <a class="flex flex-col items-center justify-center bg-primary-container dark:bg-on-primary-fixed-variant text-on-primary-container dark:text-primary-fixed rounded-2xl px-6 py-1 hover:bg-surface-variant dark:hover:bg-on-surface-variant transition-all active:scale-95 duration-200" href="settings.html">
        <span class="material-symbols-outlined" data-icon="settings" data-weight="fill" style="font-variation-settings: 'FILL' 1;">settings</span>
        <span class="font-label-md text-label-md mt-1">設定</span>
      </a>
    </div>
  </nav>
</body>
</html>
