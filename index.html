<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Zen-Learning - 30 日英語挑戰</title>
  
  <!-- CSS Stylesheets -->
  <link href="css/style.css" rel="stylesheet"/>
  
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <!-- Tailwind CSS Configuration & CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="js/tailwind-config.js"></script>
  
  <!-- Page Script -->
  <script src="js/index.js" defer></script>
</head>
<body class="bg-surface text-on-surface antialiased font-body-md text-body-md pb-24 md:pb-0">

  <!-- TopAppBar (Mobile & Web) -->
  <header class="bg-surface w-full top-0 sticky shadow-sm z-40 hidden md:block">
    <div class="flex items-center justify-between px-margin-mobile md:px-margin-desktop h-16 max-w-7xl mx-auto">
      <a href="index.html" class="flex items-center gap-2 text-primary font-headline-md text-headline-md font-bold hover:bg-surface-container transition-colors p-2 rounded-lg cursor-pointer active:translate-y-0.5 transition-transform duration-150">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">language</span>
        <span>Zen-Learning</span>
      </a>
      
      <!-- Web Nav Cluster -->
      <nav class="flex items-center gap-6">
        <a class="text-primary font-label-md text-label-md hover:bg-surface-container transition-colors p-2 rounded-lg active:translate-y-0.5 transition-transform duration-150" href="index.html">首頁</a>
        <a class="text-on-surface-variant font-label-md text-label-md hover:bg-surface-container transition-colors p-2 rounded-lg active:translate-y-0.5 transition-transform duration-150" href="settings.html">設定</a>
      </nav>
    </div>
  </header>

  <!-- TopAppBar (Mobile Only - Simplified) -->
  <header class="bg-surface w-full top-0 sticky shadow-sm z-40 md:hidden">
    <div class="flex items-center justify-between px-margin-mobile h-16">
      <a href="index.html" class="flex items-center gap-2 text-primary font-headline-md text-headline-md font-bold">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">language</span>
        <span>Zen-Learning</span>
      </a>
    </div>
  </header>

  <!-- Main Canvas -->
  <main class="max-w-3xl mx-auto px-margin-mobile md:px-margin-desktop pt-md pb-xl">
    <!-- Hero / Overview Bento -->
    <section class="mb-lg">
      <div class="bg-surface-container-lowest rounded-2xl p-6 shadow-soft relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-primary-container opacity-20 rounded-full -mr-16 -mt-16 blur-xl"></div>
        <h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-2">30 日英語挑戰</h1>
        <p class="font-body-md text-body-md text-on-surface-variant mb-6 max-w-md">透過精心策劃的每日情境，一步步精通日常英語。</p>
        
        <!-- Overall Progress -->
        <div class="flex items-center gap-4">
          <div class="flex-1 h-3 bg-surface-container rounded-full overflow-hidden relative">
            <div id="progress-bar" class="h-full bg-primary rounded-full" style="width:0%"></div>
            <!-- Milestone markers -->
            <div class="absolute top-0 bottom-0 left-[16.6%] w-px bg-white/50"></div>
            <div class="absolute top-0 bottom-0 left-[33.3%] w-px bg-white/50"></div>
            <div class="absolute top-0 bottom-0 left-[50%] w-px bg-white/50"></div>
            <div class="absolute top-0 bottom-0 left-[66.6%] w-px bg-white/50"></div>
            <div class="absolute top-0 bottom-0 left-[83.3%] w-px bg-white/50"></div>
          </div>
          <span id="progress-text" class="font-label-md text-label-md text-primary">0/30</span>
        </div>
      </div>
    </section>

    <!-- Contexts List (Bento-inspired grid/list) -->
    <section id="day-list" class="grid gap-sm">
      <!-- Dynamic day buttons populated by JS -->
    </section>
  </main>

  <!-- BottomNavBar (Mobile Only) -->
  <nav class="bg-surface-container-lowest fixed bottom-0 w-full z-50 rounded-t-xl shadow-[0_-2px_10px_rgba(0,0,0,0.04)] md:hidden">
    <div class="flex justify-around items-center h-20 px-4 pb-safe">
      <!-- Active: Home -->
      <a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-2xl px-6 py-1 hover:bg-surface-variant transition-all active:scale-95 transition-transform duration-200" href="index.html">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
        <span class="font-label-md text-label-md mt-1">首頁</span>
      </a>
      
      <!-- Inactive: Settings -->
      <a class="flex flex-col items-center justify-center text-on-surface-variant px-6 py-1 hover:bg-surface-variant transition-all active:scale-95 transition-transform duration-200" href="settings.html">
        <span class="material-symbols-outlined">settings</span>
        <span class="font-label-md text-label-md mt-1">設定</span>
      </a>
    </div>
  </nav>
</body>
</html>
