<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Zen-Learning - 登入</title>
  
  <!-- CSS Stylesheets -->
  <link href="css/style.css" rel="stylesheet"/>
  
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <!-- Tailwind CSS Configuration & CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="js/tailwind-config.js"></script>
  
  <!-- Page Script -->
  <script src="js/login.js" defer></script>
</head>
<body class="bg-surface text-on-surface min-h-screen relative overflow-hidden flex flex-col items-center justify-center">
  <!-- Ambient Background Elements for Airy Feel -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary-fixed/40 blur-[80px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-secondary-fixed/30 blur-[100px]"></div>
    <div class="absolute top-[20%] right-[-20%] w-[40vw] h-[40vw] rounded-full bg-tertiary-fixed/30 blur-[90px]"></div>
  </div>

  <main class="w-full max-w-md px-margin-mobile flex flex-col items-center relative z-10">
    <!-- Soft Illustration Area -->
    <div class="w-full aspect-square max-w-[280px] mb-lg rounded-[2rem] overflow-hidden shadow-[0_4px_20px_rgba(30,41,59,0.03)] bg-surface-container-lowest">
      <img alt="Zen Learning Illustration" class="w-full h-full object-cover opacity-90" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDWkfbh2gcI7u_WhtwiNvWIH8WrRHL_N8OlpyNgkJXRcSVUN0Uf7wpBEJA5nmk7OPBoM4rFA-294pScR_kNwY_8CqfEJG2PkOavAj-EyNZFKUep2bcea30envKSalOVhvbb6STwaxdzf13aFthEdRSVjsAuaMTOijQhjd3WCDbqiYvi-4rAGG_RiyioE0CQYTgSoGg0AjRFXG5ZLj5qKNTqR_COmihmToOTIqp5dz02cXQZI8H5cQjDurJVHP-i3RnG8-nYaSkFJRu9"/>
    </div>

    <!-- Typography Context -->
    <div class="text-center mb-lg w-full">
      <h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-base">
        歡迎開啟 30 日英語挑戰
      </h1>
      <p class="font-body-md text-body-md text-on-surface-variant">
        找回專注，精通語言。
      </p>
    </div>

    <!-- Action Area (Glassmorphism Card) -->
    <div class="w-full bg-surface-container-lowest/80 backdrop-blur-md rounded-2xl p-md shadow-[0_2px_10px_rgba(30,41,59,0.04)] border border-surface-container-high flex flex-col gap-sm">
      <!-- Google Login Button -->
      <button id="google-login-btn" class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-lg flex items-center justify-center gap-3 hover:bg-primary-container/30 transition-colors duration-200 active:translate-y-[1px]">
        <svg fill="none" height="18" viewbox="0 0 18 18" width="18" xmlns="http://www.w3.org/2000/svg">
          <path clip-rule="evenodd" d="M17.64 9.20455C17.64 8.56636 17.5827 7.95273 17.4764 7.36364H9V10.845H13.8436C13.635 11.97 13.0009 12.9232 12.0477 13.5614V15.8195H14.9564C16.6582 14.2527 17.64 11.9455 17.64 9.20455Z" fill="#4285F4" fill-rule="evenodd"></path>
          <path clip-rule="evenodd" d="M9 18C11.43 18 13.4673 17.1941 14.9564 15.8195L12.0477 13.5614C11.2418 14.1014 10.2109 14.4205 9 14.4205C6.65591 14.4205 4.67182 12.8373 3.96409 10.71H0.957275V13.0418C2.43818 15.9832 5.48182 18 9 18Z" fill="#34A853" fill-rule="evenodd"></path>
          <path clip-rule="evenodd" d="M3.96409 10.71C3.78409 10.17 3.68182 9.59318 3.68182 9C3.68182 8.40682 3.78409 7.83 3.96409 7.29H0.957275V9.62182C0.347727 8.43955 0 7.09773 0 5.66182C0 4.22591 0.347727 2.88409 0.957275 1.70182V4.03364L3.96409 6.36545C4.67182 4.23818 6.65591 2.655 9 2.655C10.3255 2.655 11.5118 3.10909 12.4445 3.98455L15.0218 1.40727C13.4632 0.535909 11.43 0 9 0C5.48182 0 2.43818 2.01682 0.957275 4.95818H3.96409V7.29Z" fill="#FBBC05" fill-rule="evenodd"></path>
          <path clip-rule="evenodd" d="M9 3.57955C10.3255 3.57955 11.5118 4.03364 12.4445 4.90909L15.0218 2.33182C13.4632 0.887727 11.43 0 9 0C5.48182 0 2.43818 2.01682 0.957275 4.95818L3.96409 7.29C4.67182 5.16273 6.65591 3.57955 9 3.57955Z" fill="#EA4335" fill-rule="evenodd"></path>
        </svg>
        <span class="font-label-md text-label-md text-on-surface">使用 Google 帳號登入</span>
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-3 w-full">
        <div class="flex-1 h-px bg-outline-variant/50"></div>
        <span class="font-label-sm text-label-sm text-outline">or</span>
        <div class="flex-1 h-px bg-outline-variant/50"></div>
      </div>

      <!-- Secondary Action -->
      <button id="email-login-btn" class="w-full h-12 bg-transparent border border-outline-variant rounded-lg flex items-center justify-center gap-2 hover:bg-secondary-container/30 hover:border-secondary/30 text-on-surface-variant transition-all duration-200 active:translate-y-[1px]">
        <span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
        <span class="font-label-md text-label-md">使用電子郵件登入</span>
      </button>
    </div>

    <!-- Minimal Footer -->
    <div class="mt-lg text-center px-4">
      <p class="font-label-sm text-label-sm text-on-surface-variant">
        繼續使用即代表您同意我們的<a class="text-primary hover:underline" href="#">服務條款</a>與<a class="text-primary hover:underline" href="#">隱私權政策</a>。
      </p>
    </div>
  </main>
</body>
</html>
